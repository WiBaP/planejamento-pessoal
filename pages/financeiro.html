<!-- Resumo financeiro -->
<div class="metrics" id="fin-metrics"></div>

<!-- Lista de transações -->
<div class="stitle">Transações Do Mês</div>
<div class="card"><div id="tx-list"></div></div>

<!-- Formulário de transação -->
<div class="stitle">Adicionar Transação</div>
<div class="form-row">
  <select id="tx-tipo" style="width:95px;">
    <option value="out">Saída</option>
    <option value="in">Entrada</option>
  </select>
  <input type="text" id="tx-desc" placeholder="Descrição" class="flex1">
  <input type="number" id="tx-val" placeholder="Valor Em R$" min="0" step="0.01" style="width:110px;">
  <input type="text" id="tx-cat" placeholder="Categoria" style="width:110px;">
  <button type="button" class="btn btn-primary" onclick="addTx()">Adicionar</button>
</div>
