<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejamento Pessoal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#13102a">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Planejamento">
</head>
<body>
<div class="app-shell">
  <!-- Header with local save status -->
  <div class="app-header">
    <div class="app-title">Planejamento Pessoal</div>
    <div class="header-right">
      <div class="save-status">
        <div class="save-dot saved" id="save-dot"></div>
        <span id="save-label">Salvo Neste Navegador</span>
      </div>
    </div>
  </div>

  <!-- Temporary notice while the project still uses browser storage -->
  <div class="banner info show">
    <span>Seus Dados Ficam Salvos Neste Navegador Enquanto Finalizamos A Estrutura Para Migrar Depois Para Banco De Dados.</span>
  </div>

  <div class="banner" id="feedback-banner">
    <span id="feedback-text"></span>
  </div>

  <!-- Main navigation -->
  <div class="tabs">
    <button type="button" class="tab active" onclick="switchTab('rotina',this)">Rotina</button>
    <button type="button" class="tab" onclick="switchTab('metas',this)">Metas</button>
    <button type="button" class="tab" onclick="switchTab('mercado',this)">Mercado</button>
  </div>

  <!-- Current page content is injected by app.js -->
  <div id="page-content"></div>
</div>
<div id="form-backdrop" class="form-backdrop" onclick="onBackdropClick()"></div>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/state.js"></script>
<script src="js/dataService.js"></script>
<script src="js/rotina.js"></script>
<script src="js/metas.js"></script>
<script src="js/mercado.js"></script>
<script src="js/app.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('Service Worker registrado:', reg.scope))
            .catch(err => console.error('Falha ao registrar Service Worker:', err));
        });
      }
    </script>
</body>
</html>
